name: Deploy Walabu Travel to Bluehost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Deploy theme
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.BLUEHOST_HOST }}
          REMOTE_USER: ${{ secrets.BLUEHOST_USER }}
          REMOTE_PORT: 22
          SOURCE: "wp-content/themes/walabu-travel-theme/"
          TARGET: "/home/gmahakmy/public_html/wp-content/themes/walabu-travel-theme/"
          ARGS: "-avz --delete"

      - name: Wait before plugin deploy
        run: sleep 10

      - name: Deploy plugin
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.BLUEHOST_HOST }}
          REMOTE_USER: ${{ secrets.BLUEHOST_USER }}
          REMOTE_PORT: 22
          SOURCE: "wp-content/plugins/walabu-duffel-booking/"
          TARGET: "/home/gmahakmy/public_html/wp-content/plugins/walabu-duffel-booking/"
          ARGS: "-avz --delete"
