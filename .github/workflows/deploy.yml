name: Deploy Walabu Travel to Bluehost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Deploy theme and plugin with rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.BLUEHOST_HOST }}
          REMOTE_USER: ${{ secrets.BLUEHOST_USER }}
          REMOTE_PORT: 22
          SOURCE: "wp-content/"
          TARGET: "/home/gmahakmy/public_html/wp-content/"
          ARGS: "-avz --delete --include='themes/walabu-travel-theme/***' --include='plugins/walabu-duffel-booking/***' --include='themes/' --include='plugins/' --exclude='*'"
